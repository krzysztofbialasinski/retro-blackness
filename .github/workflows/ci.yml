name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy src

      - name: Cyclomatic complexity (max 10)
        run: ruff check --select C90 src tests

      - name: File length (max 500 LOC)
        run: python scripts/check_file_length.py

      - name: Full regression suite + coverage gate (min 80%)
        run: pytest
