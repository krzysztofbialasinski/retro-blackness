name: CI

on:
  # No branch filter: gate every PR regardless of target branch. Needed because this repo
  # currently PRs into an integration branch (feature/convert-to-luau-lune) before that
  # eventually merges to main -- a main-only filter would let PRs into it skip CI entirely.
  pull_request:
  push:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rokit
        run: |
          curl -fsSL https://raw.githubusercontent.com/rojo-rbx/rokit/main/scripts/install.sh | bash
          echo "$HOME/.rokit/bin" >> "$GITHUB_PATH"

      - name: Install pinned tools
        run: rokit install --no-trust-check

      - name: Generate Lune type definitions
        run: lune setup

      - name: Format check (stylua)
        run: stylua --check src tests scripts

      - name: Lint (selene)
        run: selene src tests scripts

      - name: Type check (luau-lsp, strict)
        run: luau-lsp analyze --platform=standard src tests scripts

      - name: Cyclomatic complexity (max 10)
        run: lune run scripts/check_complexity.luau

      - name: File length (max 500 LOC)
        run: lune run scripts/check_file_length.luau

      - name: Tests (full regression suite)
        run: lune run scripts/run_tests.luau

      - name: Coverage gate (min 80%)
        run: lune run scripts/check_coverage.luau

      - name: Build place (rojo)
        run: rojo build game/default.project.json -o build.rbxlx
